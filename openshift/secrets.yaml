# This Secret holds private settings (API keys and model server addresses). Treat it like a locked drawer.
# Replace the placeholder text BEFORE relying on this in production, or edit the Secret later in the OpenShift Console.
apiVersion: v1
# Kubernetes stores sensitive strings in a Secret so they are not printed casually in logs or the UI.
kind: Secret
metadata:
  # A clear name so the Deployment can pull these values in as environment variables.
  name: open-webui-secrets
  # Same project as the app; Secrets only work when referenced from the same namespace (unless you share them on purpose).
  namespace: open-webui
  labels:
    app: open-webui
# stringData lets you write human-readable values; OpenShift encodes them when the object is saved.
type: Opaque
stringData:
  # This random-looking value signs user sessions; change it to a long unique string you generate once.
  WEBUI_SECRET_KEY: "REPLACE_ME_WITH_A_LONG_RANDOM_SECRET"
  # Semicolon-separated list of OpenAI-compatible API base URLs (each is one model endpoint you already run).
  # Example pairs with keys below: first URL uses first key, second URL uses second key, and so on.
  OPENAI_API_BASE_URLS: "https://your-first-openshift-ai-endpoint.example.com/v1;https://your-second-openshift-ai-endpoint.example.com/v1"
  # Semicolon-separated API keys in the SAME ORDER as OPENAI_API_BASE_URLS (use a single ; with no spaces if unsure).
  OPENAI_API_KEYS: "REPLACE_ME_KEY_FOR_ENDPOINT_1;REPLACE_ME_KEY_FOR_ENDPOINT_2"
  # If you switch RAG embeddings to Ollama, set OLLAMA_BASE_URL to your in-cluster or external Ollama HTTP address.
  # OLLAMA_BASE_URL: "http://ollama-service.namespace.svc.cluster.local:11434"
