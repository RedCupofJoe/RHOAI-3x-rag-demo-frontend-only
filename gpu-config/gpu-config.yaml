# SECTION 1: CHANGE STRATEGY TO MIXED
# This is the "Magic Line" that allows one GPU to be Full and the other to be Sliced.
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
spec:
  mig:
    strategy: mixed  # <--- THIS IS THE CHANGE
---
# SECTION 2: THE "DIVIDER" (CONFIGMAP)
# This defines the "1 Full, 7 Small" layout.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-mig-configuration
  namespace: nvidia-gpu-operator
data:
  h100-mixed-layout: |
    version: v1
    mig-configs:
      all-1full-7small:
        - devices: [0]
          mig-enabled: true
          mig-devices:
            "7g.80gb": 1
        - devices: [1]
          mig-enabled: true
          mig-devices:
            "1g.10gb": 7
---
# SECTION 3: OPENSHIFT AI MENU (HARDWARE PROFILES)
apiVersion: dashboard.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: h100-full-80gb
  namespace: redhat-ods-applications
spec:
  displayName: "NVIDIA H100 - Full GPU (80GB)"
  identifiers:
    - identifier: nvidia.com/mig-7g.80gb
      displayName: "80GB Slice"
      minCount: 1
      maxCount: 1
---
apiVersion: dashboard.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: h100-slice-10gb
  namespace: redhat-ods-applications
spec:
  displayName: "NVIDIA H100 - Shared Slice (10GB)"
  identifiers:
    - identifier: nvidia.com/mig-1g.10gb
      displayName: "10GB Slice"
      minCount: 1
      maxCount: 1
